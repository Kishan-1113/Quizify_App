spring.application.name=quizify
spring.config.import=optional:file:.env[.properties]

# PostgreSQL Configuration
spring.datasource.url=${POSTGRES_URL}
spring.datasource.username=${POSTGRES_DB}
spring.datasource.password=${POSTGRES_PASSWORD}

app.cors.frontendurls=https://quizify-frontend-chi.vercel.app, https://quizifyfrontend-rc5u.onrender.com, https://quizifyfrontend-sooty.vercel.app
# JPA/Hibernate Configuration
# This line create table automatically if not present previously
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

app.jwt.secret=${JWT_SECRET}

server.port=${PORT:8083}